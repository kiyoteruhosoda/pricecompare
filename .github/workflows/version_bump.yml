name: Version Bump

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Version bump type"
        required: true
        default: auto
        type: choice
        options:
          - auto
          - major
          - minor
          - patch

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  bump-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Resolve bump type
        id: bump-type
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.bump_type }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=auto" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version
        id: bump
        run: bash scripts/bump_version.sh "${{ steps.bump-type.outputs.value }}"

      - name: Create version tag
        if: steps.bump.outputs.new_version != ''
        run: |
          VERSION="v${{ steps.bump.outputs.new_version }}"
          git add pubspec.yaml
          git commit -m "chore: bump version to ${{ steps.bump.outputs.new_version_full }}"
          if git rev-parse "refs/tags/$VERSION" >/dev/null 2>&1; then
            echo "Tag $VERSION already exists, skipping tag creation."
            git push origin main
          else
            git tag "$VERSION"
            git push origin main --tags
          fi
